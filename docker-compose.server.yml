services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    restart: unless-stopped
    environment:
      PROJECT_NAME: ${PROJECT_NAME}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      INITIAL_ADMIN_FULL_NAME: ${INITIAL_ADMIN_FULL_NAME}
      INITIAL_ADMIN_LOGIN: ${INITIAL_ADMIN_LOGIN}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      BACKEND_CORS_ORIGINS: https://${DOMAIN}
      ROAD700_PROJECT_ROOT: /app
      ROAD700_STORAGE_ROOT: /app/storage
      ROAD700_FRONTEND_DIST: /app/frontend/dist
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app_storage:/app/storage
      - ./backend/data:/app/data:ro
      - ./Реестр автомобилей:/app/Реестр автомобилей:ro
      - ./Заказ-наряды:/app/Заказ-наряды:ro
      - ./Сервисы:/app/Сервисы:ro
      - ./Норма часов Донг Фенг 2025 год.xlsx:/app/Норма часов Донг Фенг 2025 год.xlsx:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')\""]
      interval: 15s
      timeout: 5s
      retries: 8

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/server/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  app_storage:
  caddy_data:
  caddy_config:
